
<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
  <title>Mobilný e-podpis – Signature Pad (Szymon Nowak)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/l10n/sk.css">
  <style>
    :root {
      --bg: #D4B483;
      --fg: #000000;
      --muted: #444444;
      --accent: #0057ff;
      --ok: #28a745;
      --warn: #ffb020;
      --danger: #e5534b;
      --card: #ffffff;
      --border: #cccccc;
      --radius: 14px;
    }

    html, body {
      margin:0; padding:0;
      background:var(--bg); color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      height:100%;
      overflow-y:auto;
    }

    .wrap { max-width: 880px; margin: 0 auto; padding: 14px; }
    .card { background: var(--card); border:1px solid var(--border); border-radius: var(--radius); padding: 12px; }
    .row { display:flex; gap:10px; flex-wrap: wrap; }
    .btn { appearance:none; border:1px solid var(--border); background:#eeeeee; color:#000; padding:10px 14px; border-radius: 12px; font-weight:600; cursor:pointer; }
    .btn.primary { background: var(--accent); color:#fff; border-color: transparent; }
    .btn.ok { background: var(--ok); color:#fff; }
    .btn.warn { background: var(--warn); color:#fff; }
    .btn.danger { background: var(--danger); color:#fff; }

    form label { display:block; font-size: 13px; margin: 8px 2px 4px; }
    form input { width:100%; padding:10px; border-radius:10px; border:1px solid var(--border); }

    table.preview { width:100%; border-collapse: collapse; }
    table.preview td { padding: 8px 10px; border-bottom:1px dashed var(--border); }

    /* Modal podpisu */
    #sigModal {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.98);
      display: none;
      z-index: 9999;
      overflow-y:auto;
    }

    /* ✅ Nový rámček + podklad pre podpis */
    #sigBox {
      width: 100%;
      border: 2px solid #666;
      border-radius: 8px;
      padding: 10px;
      background: #fafafa;
    }

    /* ✅ Plátno na podpis + podpisová čiara */
    #sigCanvas {
      width: 100%;
      height: 245px;
      background: transparent !important;
      touch-action: none;
      display: block;
      border-bottom: 2px solid #000; /* čiara na podpis */
    }
  </style>
  
  
</head>

<body>
<div class="wrap">
 

  <!-- PDF NAVRCHU -->
  <div class="card" id="pdfCard">
    <div id="pdfLoading">Načítavam PDF…</div>
    <canvas id="pdfCanvas"></canvas>
    <button id="btnFill" class="btn primary" style="margin-top:8px">Vyplniť údaje</button>
  </div>

  <!-- FORMULÁR -->
  <div class="card" id="formCard" style="display:none">
    <form id="theForm"></form>
    <div class="row" style="margin-top:10px">
      <button id="btnConfirmData" class="btn ok">Potvrdiť údaje</button>
      <button id="btnCancelForm" class="btn">Zrušiť</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="card" id="previewCard" style="display:none">
    <div id="previewTableWrap"></div>
    <div class="row" style="margin-top:10px">
      <button id="btnEdit" class="btn warn">Opraviť údaje</button>
      <button id="btnSign" class="btn primary">Podpísať</button>
    </div>
  </div>

  <!-- MODAL PODPISU -->
  <div id="sigModal">
    <div style="padding:10px; display:flex; justify-content:space-between;">
      <div style="font-weight:700">Podpis</div>
      <button id="btnCloseSig" class="btn">Zavrieť</button>
    </div>

    <div style="height:50vh; padding:10px;">

  <!-- ✅ Nový rámček + podpisová čiara -->
  <div id="sigBox">
    <canvas id="sigCanvas"></canvas>
  </div>

</div>

    <div style="padding:10px; display:flex; gap:10px;">
      <button id="btnClearSig" class="btn danger">Vymazať</button>
      <button id="btnConfirmSig" class="btn ok">Potvrdiť podpis</button>
    </div>
  </div>

  <!-- VÝSLEDOK -->
  <div class="card" id="result" style="display:none; gap:10px;">
    <button onclick="downloadPDF()" class="btn ok">Stiahnuť PDF</button>
    <button onclick="closePage()" class="btn" 
            style="background:#ccc; border-color:#bbb; width:130px; font-weight:600;">
      Zavrieť
    </button>
  </div>
</div>

<embed id="pdfPreview" type="application/pdf"
       style="width:100%; height:600px; border:1px solid #ccc; margin-top:10px; display:none;">

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
/* PDF URL – ponechávam tvoju hodnotu */
const PDF_URL = 'sample.pdf';

/* FORM FIELDS */
const FORM_FIELDS = [
  { key: 'meno',   label: 'Meno a priezvisko', type: 'text', required: true },

  // ADRESA rozdelená do 4 polí
  { key: 'ulica',   label: 'Ulica', type: 'text', required: true },
  { key: 'cislo',   label: 'Číslo domu', type: 'text', required: true },
  { key: 'psc',     label: 'Smerové číslo', type: 'text', required: true },
  { key: 'mesto',   label: 'Mesto', type: 'text', required: true },

  // výsledná adresa ako 1 pole pre PDF
  { key: 'adresa',  label: 'Trvalý pobyt', type: 'hidden' },

  // RODNÉ ČÍSLO rozdelené na 2 časti
  { key: 'rc1',     label: 'Rodné číslo (prvých 6 číslic)', type: 'text', required: true, maxlength: 6, pattern: '[0-9]{6}' },
  { key: 'rc2',     label: 'Rodné číslo (posledné 4 číslice)', type: 'text', required: true, maxlength: 4, pattern: '[0-9]{4}' },

  // výsledné RC ako 1 pole pre PDF
  { key: 'rc',      label: 'Rodné číslo', type: 'hidden' },

  { key: 'miesto', label: 'Podpísané v meste', type: 'text', required: true },
  { key: 'datum',  label: 'Dátum',            type: 'text', required: true }
];

/* ✅ RENDER PDF NAVRCHU – FINÁLNA FUNKČNÁ VERZIA */
async function renderTopPDF(url = PDF_URL) {
  try {
    const pdfCanvas = document.getElementById('pdfCanvas');
    const pdfCtx    = pdfCanvas.getContext('2d');
    const loading   = document.getElementById('pdfLoading');

    loading.textContent = 'Načítavam PDF…';

    const loadingTask = pdfjsLib.getDocument(url);
    const pdf = await loadingTask.promise;
    const page = await pdf.getPage(1);

    // šírka cardu pre mobil
    const cardWidth = document.getElementById('pdfCard').clientWidth - 20;

    const unscaled = page.getViewport({ scale: 1 });
    const scale = cardWidth / unscaled.width;

    const viewport = page.getViewport({ scale });

    const dpr = window.devicePixelRatio || 1;

    // CSS rozmery – aby to bolo široké presne ako spodný náhľad
    pdfCanvas.style.width = viewport.width + 'px';
    pdfCanvas.style.height = viewport.height + 'px';

    // reálne rozmery (pre ostrosť)
    pdfCanvas.width = viewport.width * dpr;
    pdfCanvas.height = viewport.height * dpr;

    const renderContext = {
      canvasContext: pdfCtx,
      viewport,
      transform: [dpr, 0, 0, dpr, 0, 0]
    };

    await page.render(renderContext).promise;

    loading.style.display = 'none';

  } catch (e) {
    document.getElementById('pdfLoading').textContent =
      'Chyba pri načítaní PDF: ' + e.message;
  }
}

renderTopPDF();

/* ==============================
      FORM – BUILD & PREVIEW
============================== */

const theForm = document.getElementById('theForm');

function buildForm(){
  theForm.innerHTML = '';
  FORM_FIELDS.forEach(f => {

    if (f.type === "hidden") return;  // preskočí skryté polia

    const id = "f_" + f.key;
    
    // Špeciálne zobrazenie pre RC1 a RC2 v jednom riadku
    if (f.key === 'rc1') {
      theForm.innerHTML += `
        <label>Rodné číslo</label>
        <div style="display: flex; gap: 5px; align-items: center;">
          <input id="f_rc1" name="rc1" type="text" 
                 maxlength="6" pattern="[0-9]{6}" 
                 placeholder="123456" 
                 style="flex: 1;" required>
          <span style="font-weight: 700; font-size: 20px;">/</span>
          <input id="f_rc2" name="rc2" type="text" 
                 maxlength="4" pattern="[0-9]{4}" 
                 placeholder="7890" 
                 style="flex: 1;" required>
        </div>
      `;
      return;
    }
    
    // RC2 už je zobrazené vyššie, preskočíme
    if (f.key === 'rc2') return;
    
    // Ostatné polia normálne
    theForm.innerHTML += `
      <label for="${id}">${f.label}</label>
      <input id="${id}" name="${f.key}" type="${f.type}" ${f.required ? 'required' : ''}>
    `;
  });
}

// ✅ Flatpickr pre slovenský kalendár s formátom DD.MM.YYYY
function initFlatpickr() {
  flatpickr("#f_datum", {
    dateFormat: "d.m.Y",
    allowInput: true,
    locale: "sk"
  });
}

function getFormData(){
  const data = {};

  FORM_FIELDS.forEach(f => {
    if (f.type === "hidden") return;
    let value = document.querySelector(`[name="${f.key}"]`).value;
    data[f.key] = value;
  });

  // poskladanie adresy
  data.adresa = `${data.ulica} ${data.cislo}, ${data.psc} ${data.mesto}`;

  // poskladanie rodného čísla
  data.rc = `${data.rc1} / ${data.rc2}`;

  return data;
}


document.getElementById('btnFill').onclick = () => {
  buildForm();
  initFlatpickr();
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('previewCard').style.display = 'none';
  document.getElementById('result').style.display = 'none';
};

document.getElementById('btnCancelForm').onclick = () => {
  document.getElementById('formCard').style.display = 'none';
};

document.getElementById('btnConfirmData').onclick = (e)=>{
  e.preventDefault();
  if(!theForm.reportValidity()) return;

  const data = getFormData();

  let rows = '';
  FORM_FIELDS.forEach(f=>{
    // preskočíme časti adresy a RC
    if (['ulica','cislo','psc','mesto','rc1','rc2'].includes(f.key)) return;
    rows += `<tr><td>${f.label}</td><td>${data[f.key]}</td></tr>`;
  });

  document.getElementById('previewTableWrap').innerHTML =
    `<table class='preview'>${rows}</table>`;

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('previewCard').style.display = 'block';
};

document.getElementById('btnEdit').onclick = ()=>{
  document.getElementById('previewCard').style.display = 'none';
  document.getElementById('formCard').style.display = 'block';
};


/* ==============================
      SIGNATURE PAD – MODAL
============================== */

let signaturePad;
const sigModal  = document.getElementById('sigModal');
const sigCanvas = document.getElementById('sigCanvas');

document.getElementById('btnSign').onclick = ()=>{
  sigModal.style.display = 'block';
  resizeSigCanvas();

  signaturePad = new SignaturePad(sigCanvas, {
    minWidth: 0.9,
    maxWidth: 2.2,
    penColor: '#58389c',               // ✅ modrý podpis
    backgroundColor: 'rgba(0,0,0,0)'   // ✅ priehľadné pozadie
  });

  document.body.style.overflow = "hidden"; // fix pre mobil
};

document.getElementById('btnCloseSig').onclick = ()=>{
  sigModal.style.display = 'none';
  document.body.style.overflow = "";
};

document.getElementById('btnClearSig').onclick = ()=>{
  if(signaturePad) signaturePad.clear();
};

function resizeSigCanvas(){
   const ratio = (window.devicePixelRatio || 1) * 2.5;   // zvýšené DPI
  sigCanvas.width  = sigCanvas.clientWidth * ratio;
  sigCanvas.height = sigCanvas.clientHeight * ratio;
  sigCanvas.getContext('2d').scale(ratio, ratio);
}

window.onresize = ()=>{
  if(sigModal.style.display === 'block'){
    resizeSigCanvas();
  }
};


/* ==============================
      FINAL PDF EXPORT
============================== */

document.getElementById('btnConfirmSig').onclick = async()=>{

  if(signaturePad.isEmpty()){
    alert("Podpis je prázdny.");
    return;
  }

  // zatvor modal
sigModal.style.display = 'none';
document.body.style.overflow = "";

try {
  const sigDataUrl = signaturePad.toDataURL('image/png');

  // ✅ NAČÍTAJ PÔVODNÉ PDF
  const existingPdfBytes = await fetch(PDF_URL).then(r => r.arrayBuffer());
  const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);

  // ✅ REGISTRUJ FONTKIT
  pdfDoc.registerFontkit(fontkit);

  const page = pdfDoc.getPages()[0];

  // ✅ NAČÍTAJ LOKÁLNY DEJAVU SANS (priamo z priečinka)
  const fontBytes = await fetch("DejaVuSans.ttf").then(r => r.arrayBuffer());

  // embedni font s podporou diakritiky
  const font = await pdfDoc.embedFont(fontBytes, { subset: false });
  console.log('✔️ DejaVuSans načítaný (diakritika OK)');

  // načítaj údaje
  const data = getFormData();


  /* ==========
   VLOŽENIE ÚDAJOV DO PDF
========== */

const fieldsXY = {
  meno:   {x: 170, y: 696},
  adresa: {x: 170, y: 673},
  rc:     {x: 170, y: 650},
  miesto: {x: 280, y: 265},
  datum:  {x: 118, y: 265}
};

for (const f of FORM_FIELDS) {
  const xy = fieldsXY[f.key];
  if (!xy) continue;

  const text = String(data[f.key] || "");

  // 🔥 VLOŽENIE TEXTU S DIKRITIKOU
  page.drawText(text, {
    x: xy.x,
    y: xy.y,
    size: 12,
    font: font,         // ← ROBOTO
    color: PDFLib.rgb(0,0,0)
  });
}
  
  

    /* ==========
        VLOŽENIE PODPISU
       ========== */

    const pngImage = await pdfDoc.embedPng(sigDataUrl);

    const SIGN_W = 170;
    const SIGN_H = 60;

    page.drawImage(pngImage, {
      x: 75,  
      y: 140,
      width:  SIGN_W,
      height: SIGN_H
    });

    /* ==========
        ULOŽENIE PDF
       ========== */
    const pdfBytes = await pdfDoc.save();
    const url = URL.createObjectURL(
      new Blob([pdfBytes], { type: 'application/pdf' })
    );

    // ✅ uložíme URL GLOBÁLNE
    window.pdfURL = url;
    window.pdfBytes = pdfBytes;

    // ✅ NÁHĽAD + TLAČIDLÁ
    const msg = document.createElement('div');
    msg.style.cssText = `
      position: fixed;
      inset: 0;
      background: #D4B483;
      color: #000;
      display: flex;
      flex-direction: column;
      z-index: 99999;
      overflow-y: auto;
    `;

    msg.innerHTML = `
      <div style="
        padding: 15px;
        background: white;
        border-bottom: 2px solid #ccc;
        text-align: center;
        font-size: 20px;
        font-weight: 700;
      ">
        ✅ Náhľad vyplneného PDF
      </div>
      
      <div style="
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        background: #D4B483;
      ">
        <canvas id="finalPdfCanvas" style="
          width: 100%;
          border: 2px solid #666;
          border-radius: 8px;
          background: white;
          display: block;
          margin: 0 auto;
        "></canvas>
      </div>
      
      <div style="
        padding: 15px;
        background: white;
        border-top: 2px solid #ccc;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      ">
        <button id="btnDownloadNow" style="
          padding: 15px 35px;
          background: #28a745;
          color: white;
          border: none;
          border-radius: 10px;
          font-size: 18px;
          font-weight: 600;
          cursor: pointer;
        ">📥 Stiahnuť PDF</button>
        
        <button id="btnCloseNow" style="
          padding: 15px 35px;
          background: #ccc;
          color: #000;
          border: none;
          border-radius: 10px;
          font-size: 18px;
          font-weight: 600;
          cursor: pointer;
        ">✖️ Zavrieť</button>
      </div>
      
      <div id="emailStatus" style="
        padding: 10px;
        text-align: center;
        font-size: 14px;
        color: #666;
      ">
        📧 Odosielam na email...
      </div>
    `;

    document.body.appendChild(msg);

    // ✅ VYRENDERUJ FINÁLNE PDF NA CANVAS
    async function renderFinalPDF() {
      try {
        const canvas = document.getElementById('finalPdfCanvas');
        const ctx = canvas.getContext('2d');
        
        const loadingTask = pdfjsLib.getDocument(url);
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        
        const containerWidth = canvas.parentElement.clientWidth - 20;
        const unscaled = page.getViewport({ scale: 1 });
        const scale = containerWidth / unscaled.width;
        const viewport = page.getViewport({ scale });
        
        const dpr = window.devicePixelRatio || 1;
        
        canvas.style.width = viewport.width + 'px';
        canvas.style.height = viewport.height + 'px';
        canvas.width = viewport.width * dpr;
        canvas.height = viewport.height * dpr;
        
        await page.render({
          canvasContext: ctx,
          viewport,
          transform: [dpr, 0, 0, dpr, 0, 0]
        }).promise;
        
      } catch (e) {
        console.error('Chyba pri renderovaní PDF:', e);
      }
    }

    await renderFinalPDF();

    // ✅ AUTOMATICKÉ ODOSLANIE NA EMAIL
    async function sendEmailWithPDF() {
      try {
        const data = getFormData();
        
        const base64PDF = btoa(
          new Uint8Array(window.pdfBytes)
            .reduce((data, byte) => data + String.fromCharCode(byte), '')
        );
        
        const templateParams = {
          user_name: data.meno,
          user_rc: data.rc,
          user_adresa: data.adresa,
          user_miesto: data.miesto,
          user_datum: data.datum,
          pdf_file: base64PDF,
          pdf_filename: 'podpisany_dokument.pdf'
        };
                     
        await fetch("https://behind-item-detector-isolation.trycloudflare.com/send_mail", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(templateParams)
        });
        
        document.getElementById('emailStatus').innerHTML = 
          '✅ Email bol úspešne odoslaný!';
        document.getElementById('emailStatus').style.color = '#28a745';
        
      } catch (error) {
        console.error('Chyba pri odosielaní emailu:', error);
        document.getElementById('emailStatus').innerHTML = 
          '⚠️ Email sa nepodarilo odoslať';
        document.getElementById('emailStatus').style.color = '#e5534b';
      }
    }

    sendEmailWithPDF();

    // ✅ STIAHNUTIE
    document.getElementById('btnDownloadNow').onclick = () => {
      const a = document.createElement('a');
      a.href = window.pdfURL;
      a.download = 'vyplnene_podpisane.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      msg.innerHTML = `
        <div style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100%;
          text-align: center;
          padding: 20px;
        ">
          <div style="font-size: 24px; font-weight: 700; margin-bottom: 30px;">
            ✅ PDF bolo stiahnuté!
          </div>
          <button onclick="closePage()" style="
            padding: 15px 35px;
            background: #ccc;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
          ">✖️ Zavrieť stránku</button>
        </div>
      `;
    };

    // ✅ ZATVORENIE
    document.getElementById('btnCloseNow').onclick = () => {
      window.open('', '_self');
      window.close();
      
      setTimeout(() => {
        document.body.innerHTML = `
          <div style="
            padding:30px;
            font-size:24px;
            text-align:center;
            font-weight:600;
          ">
            Hotovo ✅<br>
            Stránku môžete zavrieť.<br><br>
            <img src="logo.png"
                 style="width:160px; margin-top:15px; opacity:0.9;">
          </div>
        `;
      }, 100);
    };

  } catch (error) {
    console.error('❌ CHYBA:', error);
    alert('Chyba pri vytváraní PDF: ' + error.message);
    
    // znovu zobraz modal pre nový pokus
    sigModal.style.display = 'block';
    document.body.style.overflow = "hidden";
  }

}; // koniec btnConfirmSig


/* ==============================
   FUNKCIA PRE ZATVORENIE (záložná)
============================== */

function closePage() {
  window.open('', '_self');
  window.close();

  setTimeout(() => {
    document.body.innerHTML = `
      <div style="
        padding:30px;
        font-size:24px;
        text-align:center;
        font-weight:600;
      ">
        Hotovo ✅<br>
        Stránku môžete zavrieť.<br><br>
        <img src="logo.png"
             style="width:160px; margin-top:15px; opacity:0.9;">
      </div>
    `;
  }, 100);
}
</script>
